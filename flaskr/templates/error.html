<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Karla&family=Yantramanav:wght@500&display=swap"
        rel="stylesheet">

    <!-- CDN styles -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css"
        integrity="sha384-0evHe/X+R7YkIZDRvuzKMRqM+OrBnVFBL6DOitfPri4tjfHxaWutUpFmBp4vmVor" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/animate.css@4.1.1/animate.min.css"
        integrity="sha256-X7rrn44l1+AUO65h1LGALBbOc5C5bOstSYsNlv9MhT8=" crossorigin="anonymous">

    <!-- Self styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/error.css') }}">

    <!-- Favicon -->
    <link rel="shortcut icon" href="{{ url_for('static', filename='img/error.ico') }}">

    <title>adituu.dev | {{ error_code }}</title>
</head>

<body>
    <nav class="navbar position-static bg-transparent">
        <div class="container-fluid">
            <a class="navbar-brand animate__animated animate__infinite animate__headShake">adituu.dev</a>
        </div>
    </nav>

    <div class="container-fluid d-flex align-items-center justify-content-center h-75 main-container">
        <p class="error-data text-center">
            <span class="error-code">{{ error_code }}</span>
            <br>
            <span class="error-message">{{ error_message }}</span>
        </p>
    </div>
</body>

<!-- CDN scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-pprn3073KE6tl6bjs2QrFaJGz5/SUsLqktiwsUTF55Jfv3qYSDhgCecCxMW52nD2" crossorigin="anonymous">
</script>

</html>
